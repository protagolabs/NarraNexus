version: 2

# Keep dependencies fresh without burying maintainers in PRs.
# Weekly cadence, grouped by ecosystem so security patches don't sit
# behind a tide of minor bumps.

updates:
  # GitHub Actions used in .github/workflows/
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: ["chore"]
    commit-message:
      prefix: "chore(deps)"

  # Frontend (Vite / React).
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels: ["chore"]
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Major bumps create churn; we'll pick those up manually.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Python (uv-managed, pyproject.toml). dependabot reads pip-compatible
  # entries; uv's lock file is honored on resolve.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels: ["chore"]
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
