name: Build Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14  # Apple Silicon runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (system — for frontend build inside the script)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: Install Tauri CLI
        # macos-14 runner regressions guarded for here:
        #
        # 1. `~/.cargo/bin/{cargo,rustc,...}` are all rustup-init shims
        #    that re-exec `rustup-init` when no toolchain is "active
        #    for the current invocation". `cargo install` fails with
        #    "unexpected argument 'install' found"; if we work around
        #    that and invoke the real cargo, cargo's own `rustc -vV`
        #    probe (to discover the host triple) ALSO hits the shim
        #    and returns `rustup-init 1.29.0 ...`, breaking cargo with
        #    "rustc -vV didn't have a line for `host:`".
        #
        #    Fix: resolve the toolchain's bin dir explicitly with
        #    `rustup which` and prepend it to PATH. Now every shelled-
        #    out `cargo` / `rustc` call — by us, by build scripts, by
        #    cargo itself — finds the real binaries first.
        #
        # 2. cargo-install can trigger a `rustup component add rust-src`
        #    mid-compile, and that download intermittently fails on
        #    the runner's APFS (the `.partial` file gets unlinked
        #    before rename, "No such file or directory (os error 2)").
        #    Pre-install rust-src in its own step with a 3x retry so
        #    we don't gamble on it inside `cargo install`.
        #
        # `set -eux` echoes resolved paths so a future runner shift is
        # debuggable from the CI log alone.
        run: |
          set -eux
          rustup default stable
          for i in 1 2 3; do
            rustup component add rust-src --toolchain stable && break
            echo "rustup component add rust-src failed (attempt $i), retrying…"
            sleep 5
          done
          TOOLCHAIN_BIN="$(dirname "$(rustup which --toolchain stable cargo)")"
          export PATH="$TOOLCHAIN_BIN:$PATH"
          # Persist across subsequent steps (Build/sign/notarize also calls
          # cargo + rustc indirectly via `cargo tauri build`).
          echo "$TOOLCHAIN_BIN" >> "$GITHUB_PATH"
          which cargo
          which rustc
          rustc -vV
          cargo install tauri-cli --version "^2"

      # Import the Developer ID cert into a temp keychain so build-desktop.sh's
      # `codesign --sign "$APPLE_SIGNING_IDENTITY"` calls can find it.
      # The script itself doesn't import — it's optimised for local builds on a
      # Mac where the cert already lives in the user's login keychain. CI has
      # no such keychain, so we set one up here and tear it down on cleanup.
      #
      # `set-key-partition-list` is the macOS 10.12+ ACL that lets codesign
      # use the imported key without an interactive password prompt.
      - name: Import Apple Developer ID certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          # Prepend the build keychain to the search list so codesign finds
          # the identity. We do NOT replace the default keychain — System.keychain
          # must stay reachable for trust evaluation of Apple's intermediate certs.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm -f "$CERT_PATH"

          echo "--- codesigning identities found ---"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      # Single source of truth for desktop builds. The script:
      #   - builds frontend
      #   - downloads standalone Python (with SHA256 verify) into resources/python/
      #   - installs project (NON-editable) into that Python so the bundle is relocatable
      #   - downloads Node.js (with SHA256 verify) into resources/nodejs/
      #   - npm ci installs claude-code + lark-cli into resources/nodejs/node_modules/
      #   - rewrites bundled bin shims to bash so Tauri's bundler can't break them
      #   - npx-installs the Lark skill pack into resources/lark-skills/
      #   - rsyncs project source into resources/project/ with the correct excludes
      #   - cargo tauri build (which assembles the .app)
      #   - manually codesigns inner Mach-O + outer bundle with hardened runtime
      #   - runs scripts/pre-notarize-audit.sh
      #   - submits to Apple notary, polls, downloads log, staples ticket to dmg
      #
      # Apple env vars are CONSUMED inside step 6/7/8 of the script. If any
      # signing/notarize var is missing the script falls back to ad-hoc.
      - name: Build, sign, notarize via canonical script
        run: bash scripts/build-desktop.sh
        env:
          # Cert + cert-password are consumed by the prior keychain-import
          # step, not by this script — passing them again would make Tauri's
          # bundler try to re-import into a second temp keychain.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Write-only PostHog ingest key, read at compile time by
          # process_manager.rs via option_env!. Absent on forks/PRs → the
          # built app falls back to NullSink (no telemetry). Set this repo
          # secret to enable telemetry from official release builds only.
          NARRA_POSTHOG_KEY: ${{ secrets.NARRA_POSTHOG_KEY }}
          # NetMind ("Power") account login in the shipped DMG. All wired to repo
          # Variables (Settings → Variables): UNSET → empty → Power login stays
          # OFF, so a default release is pure-local (username-only). Set them to
          # ship a Power-enabled DMG — point at PROD NetMind for a public release
          # (NOT protago-dev). The frontend VITE_* are baked by vite here; the
          # backend vars are baked into the launcher via option_env! (both read
          # from this step's env). VITE_NETMIND_* fall back to compiled dev
          # defaults if left empty, so set them explicitly for a prod release.
          VITE_ENABLE_POWER_LOGIN: ${{ vars.VITE_ENABLE_POWER_LOGIN }}
          VITE_NETMIND_AUTH_API: ${{ vars.VITE_NETMIND_AUTH_API }}
          VITE_NETMIND_ACCOUNTS_URL: ${{ vars.VITE_NETMIND_ACCOUNTS_URL }}
          VITE_NETMIND_SYS_CODE: ${{ vars.VITE_NETMIND_SYS_CODE }}
          VITE_NETMIND_REGISTER_URL: ${{ vars.VITE_NETMIND_REGISTER_URL }}
          NARRANEXUS_ENABLE_POWER_LOGIN: ${{ vars.NARRANEXUS_ENABLE_POWER_LOGIN }}
          NETMIND_USE_SUBSCRIPTION_ENABLED: ${{ vars.NETMIND_USE_SUBSCRIPTION_ENABLED }}
          NETMIND_AUTH_API_URL: ${{ vars.NETMIND_AUTH_API_URL }}
          BILLING_API_BASE: ${{ vars.BILLING_API_BASE }}
          NETMIND_KEY_API_BASE: ${{ vars.NETMIND_KEY_API_BASE }}
          NETMIND_INFERENCE_BASE: ${{ vars.NETMIND_INFERENCE_BASE }}

      - name: Normalize artifact filenames (stable name across versions)
        run: |
          set -euo pipefail
          DMG_DIR="tauri/src-tauri/target/release/bundle/dmg"
          mkdir -p dist
          cp "$DMG_DIR/NarraNexus.dmg" dist/NarraNexus.dmg
          cp "$DMG_DIR/NarraNexus.zip" dist/NarraNexus.zip
          # Preserve the notarization submission ID + log so we can re-query
          # Apple later if there's a downstream report of "rejected on Mac X".
          [ -f "$DMG_DIR/notarize-submission-id.txt" ] && cp "$DMG_DIR/notarize-submission-id.txt" dist/ || true
          [ -f "$DMG_DIR/notarize-latest.log" ]       && cp "$DMG_DIR/notarize-latest.log"       dist/ || true
          ls -la dist

      # Auto-update artifact. Built from the *notarized* .app (NOT via
      # createUpdaterArtifacts during the build, which would archive the
      # pre-notarized .app from before the canonical script re-signs it):
      #   1. tar+gzip the final .app
      #   2. sign the archive with the Tauri updater key → .app.tar.gz.sig
      #   3. write latest.json (version + signature + download URL) that the
      #      updater plugin fetches from the release `latest` endpoint.
      # Skipped (with a warning) when TAURI_SIGNING_PRIVATE_KEY is absent so a
      # fork without the secret still builds the dmg.
      - name: Build + sign updater artifact (latest.json)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY not set — skipping updater artifact (auto-update not published for this build)."
            exit 0
          fi
          APP_DIR="tauri/src-tauri/target/release/bundle/macos"
          [ -d "$APP_DIR/NarraNexus.app" ] || { echo "::error::NarraNexus.app not found at $APP_DIR"; exit 1; }
          tar -czf dist/NarraNexus.app.tar.gz -C "$APP_DIR" NarraNexus.app
          npx --yes @tauri-apps/cli@^2 signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
            dist/NarraNexus.app.tar.gz
          SIG="$(cat dist/NarraNexus.app.tar.gz.sig)"
          # Tag push → real version; branch test build → synthetic so the JSON is valid.
          VERSION="${GITHUB_REF_NAME#v}"
          [ "$VERSION" = "${GITHUB_REF_NAME}" ] && VERSION="0.0.0-$(date -u +%Y%m%d%H%M%S)"
          cat > dist/latest.json <<JSON
          {
            "version": "$VERSION",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIG",
                "url": "https://github.com/NetMindAI-Open/NarraNexus/releases/download/${GITHUB_REF_NAME}/NarraNexus.app.tar.gz"
              }
            }
          }
          JSON
          echo "--- latest.json ---"; cat dist/latest.json
          ls -la dist

      # Always upload as artifact so branch builds (signing tests) can be
      # downloaded and verified locally with codesign / spctl / stapler.
      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: NarraNexus-dmg
          path: |
            dist/NarraNexus.dmg
            dist/NarraNexus.zip
            dist/NarraNexus.app.tar.gz
            dist/NarraNexus.app.tar.gz.sig
            dist/latest.json
            dist/notarize-submission-id.txt
            dist/notarize-latest.log
          retention-days: 14
          if-no-files-found: warn

      # Only attach to GitHub Release on tag push (skip on branch test runs).
      # Tag-triggered releases are published immediately and marked Latest so
      # users see the most recent build front-and-center on the Releases page.
      - name: Upload DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/NarraNexus.dmg
            dist/NarraNexus.zip
            dist/NarraNexus.app.tar.gz
            dist/latest.json
          tag_name: ${{ github.ref_name }}
          name: 'NarraNexus ${{ github.ref_name }}'
          body: |
            Signed and notarized macOS build for Apple Silicon.
            Drag NarraNexus.app to /Applications and double-click — no Gatekeeper bypass needed.
          draft: false
          prerelease: false
          make_latest: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
