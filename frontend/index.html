<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Favicon follows OS color scheme, using the icon-only mark SVGs
      // (favicon-light/dark.svg) — the wordmark logo would be unreadable at
      // tab size. We crop to the alpha bounding box, then contain-fit
      // (preserving aspect ratio) onto a square transparent canvas before
      // handing the rasterized data URL to <link rel="icon">.
      (function () {
        var SIZE = 128;
        var cache = {};
        var mq = window.matchMedia('(prefers-color-scheme: dark)');

        function alphaBBox(ctx, w, h) {
          var data = ctx.getImageData(0, 0, w, h).data;
          var minX = w, minY = h, maxX = -1, maxY = -1;
          for (var y = 0; y < h; y++) {
            for (var x = 0; x < w; x++) {
              if (data[(y * w + x) * 4 + 3] !== 0) {
                if (x < minX) minX = x;
                if (y < minY) minY = y;
                if (x > maxX) maxX = x;
                if (y > maxY) maxY = y;
              }
            }
          }
          if (maxX < 0) return { x: 0, y: 0, w: w, h: h };
          return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
        }

        function build(src, cb) {
          if (cache[src]) { cb(cache[src]); return; }
          var img = new Image();
          img.onload = function () {
            var probe = document.createElement('canvas');
            probe.width = img.width;
            probe.height = img.height;
            var pctx = probe.getContext('2d');
            pctx.drawImage(img, 0, 0);
            var box = alphaBBox(pctx, img.width, img.height);

            var canvas = document.createElement('canvas');
            canvas.width = SIZE;
            canvas.height = SIZE;
            var ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            var scale = Math.min(SIZE / box.w, SIZE / box.h);
            var dw = box.w * scale;
            var dh = box.h * scale;
            ctx.drawImage(img, box.x, box.y, box.w, box.h, (SIZE - dw) / 2, (SIZE - dh) / 2, dw, dh);
            cache[src] = canvas.toDataURL('image/png');
            cb(cache[src]);
          };
          img.onerror = function () { cb(src); };
          img.src = src;
        }

        function apply(isDark) {
          var src = isDark ? '/favicon-dark.svg' : '/favicon-light.svg';
          build(src, function (href) {
            var head = document.head;
            var existing = head.querySelector("link[rel~='icon'][data-runtime]");
            if (existing) head.removeChild(existing);
            var link = document.createElement('link');
            link.rel = 'icon';
            link.type = 'image/png';
            link.href = href;
            link.setAttribute('data-runtime', '1');
            head.appendChild(link);
          });
        }

        apply(mq.matches);
        mq.addEventListener ? mq.addEventListener('change', function (e) { apply(e.matches); })
                            : mq.addListener(function (e) { apply(e.matches); });
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NarraNexus · NetMind.AI</title>
    <!-- NM design system uses pure system font stack — no web font loaded here.
         See frontend/src/index.css @theme --font-display / --font-sans / --font-mono
         for the SF Pro + CJK fallback chain. -->
  </head>
  <body>
    <div id="root"></div>
    <!-- Runtime config — loaded BEFORE the bundle so the app sees it synchronously.
         Overwritten at container start by the deploy pipeline. -->
    <script src="/config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
